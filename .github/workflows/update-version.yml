name: Update version.json & installers

# 由 moon-doc/moon-reader 发版后通过 repository_dispatch 触发。
# 本 workflow 用自身仓库的 GITHUB_TOKEN 更新自己（无需跨仓凭证）：
#   - 写入 version.json
#   - 下载本次版本的安装包到 downloads/<version>/，清空旧版本（只保留最新）
on:
  repository_dispatch:
    types: [publish-version]

permissions:
  contents: write

jobs:
  update:
    name: Publish version.json + installers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.client_payload.version != ''

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Parse payload
        id: payload
        env:
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          echo "Parsing dispatch payload..."
          VERSION=$(echo "$PAYLOAD" | jq -r '.version')
          NOTES=$(echo "$PAYLOAD" | jq -r '.notes // ""')
          RELEASED_AT=$(echo "$PAYLOAD" | jq -r '.releasedAt // ""')
          SOURCE_REPO=$(echo "$PAYLOAD" | jq -r '.sourceRepo // "moon-doc/moon-reader"')
          SOURCE_TAG=$(echo "$PAYLOAD" | jq -r '.sourceTag // ""')
          # 一次性下载 token：moon-reader 仓库的 GITHUB_TOKEN（仅本次 run 有效，
          # 用于下载私有仓 moon-reader 的 release 资产到本公开仓）
          DOWNLOAD_TOKEN=$(echo "$PAYLOAD" | jq -r '.downloadToken // ""')
          PAGES_BASE="https://moon.jdk.plus"

          {
            echo "version=$VERSION"
            echo "notes=$NOTES"
            echo "released_at=$RELEASED_AT"
            echo "source_repo=$SOURCE_REPO"
            echo "source_tag=$SOURCE_TAG"
            echo "download_token=$DOWNLOAD_TOKEN"
            echo "pages_base=$PAGES_BASE"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Publishing v${VERSION} from ${SOURCE_REPO}@${SOURCE_TAG}"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ steps.payload.outputs.download_token }}
          SOURCE_REPO: ${{ steps.payload.outputs.source_repo }}
          SOURCE_TAG: ${{ steps.payload.outputs.source_tag }}
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          set -e
          mkdir -p "downloads/${VERSION}"
          # 用 gh release download 拉取资产（gh 会处理私有仓鉴权）
          gh release download "$SOURCE_TAG" -R "$SOURCE_REPO" \
            --dir "downloads/${VERSION}" --clobber
          # 剔除终端用户用不到的资产
          rm -f "downloads/${VERSION}"/*.aab "downloads/${VERSION}"/*.xcarchive.zip
          echo "Downloaded assets:"
          ls -la "downloads/${VERSION}/"

      - name: Rename assets & build download URLs
        id: urls
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          PAGES_BASE: ${{ steps.payload.outputs.pages_base }}
        run: |
          set -e
          MAC=""; WIN=""; AND=""; LIN=""
          cd "downloads/${VERSION}"
          for f in *; do
            [ -z "$f" ] && continue
            case "$f" in
              *.dmg)
                new="小月亮阅读器_${VERSION}_macos_universal.dmg"; mv -f "$f" "$new"
                MAC="${PAGES_BASE}/downloads/${VERSION}/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$new")" ;;
              *.exe)
                new="小月亮阅读器_${VERSION}_windows_x64-setup.exe"; mv -f "$f" "$new"
                WIN="${PAGES_BASE}/downloads/${VERSION}/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$new")" ;;
              *.apk)
                new="小月亮阅读器_${VERSION}_android_universal.apk"; mv -f "$f" "$new"
                AND="${PAGES_BASE}/downloads/${VERSION}/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$new")" ;;
              *.deb|*.AppImage)
                new="小月亮阅读器_${VERSION}_linux.${f##*.}"; mv -f "$f" "$new"
                LIN="${PAGES_BASE}/downloads/${VERSION}/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$new")" ;;
              *) rm -f "$f" ;;
            esac
          done
          cd - >/dev/null
          {
            echo "mac=${MAC}"
            echo "win=${WIN}"
            echo "and=${AND}"
            echo "lin=${LIN}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate version.json
        env:
          VERSION: ${{ steps.payload.outputs.version }}
          NOTES: ${{ steps.payload.outputs.notes }}
          RELEASED_AT: ${{ steps.payload.outputs.released_at }}
          MAC: ${{ steps.urls.outputs.mac }}
          WIN: ${{ steps.urls.outputs.win }}
          AND: ${{ steps.urls.outputs.and }}
          LIN: ${{ steps.urls.outputs.lin }}
        run: |
          jq -n --arg v "$VERSION" --arg n "$NOTES" --arg t "$RELEASED_AT" \
                --arg mac "$MAC" --arg win "$WIN" --arg and "$AND" --arg lin "$LIN" \
            '{version:$v, releasedAt:$t, notes:$n,
              downloadUrl:"https://moon.jdk.plus#start", minimumRequired:"1.0.0",
              downloads:{macos:$mac, windows:$win, android:$and, linux:$lin, ios:""}}' \
            > version.json
          echo "Generated version.json:"
          cat version.json

      - name: Commit & push (keep only latest version)
        env:
          VERSION: ${{ steps.payload.outputs.version }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 清空旧版本下载目录，只保留本次最新版本（避免仓库随版本累积膨胀）
          git rm -rf --ignore-unmatch downloads >/dev/null 2>&1 || true
          git add downloads/"$VERSION" version.json
          git commit -m "chore: publish v${VERSION} installers + version.json (only latest kept)" || {
            echo "::notice::No changes to commit"
            exit 0
          }
          git push
